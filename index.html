<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1C1917">
<title>Carnet de thèse — Art rupestre du Maroc</title>

<!-- PWA / iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Thèse Archéo">
<meta name="description" content="Plateforme de suivi de thèse — art rupestre et sites préhistoriques du Maroc">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   SYSTÈME DE DESIGN — strates, terre, encre
   ============================================================ */
:root{
  --paper:#FBF6EC;
  --sand:#F2EAD8;
  --sand-deep:#E7DBC2;
  --sand-edge:#DCCDAE;
  --ink:#1C1917;
  --ink-soft:#3A332C;
  --muted:#7A6E5C;
  --muted-2:#9A8C76;
  --sienna:#B85C2C;
  --sienna-deep:#9A4A20;
  --sage:#5C7A5E;
  --sage-deep:#465F48;
  --line:rgba(28,25,23,.12);
  --line-soft:rgba(28,25,23,.07);
  --shadow:0 1px 2px rgba(28,25,23,.06),0 8px 28px -12px rgba(28,25,23,.22);
  --shadow-lg:0 24px 60px -20px rgba(28,25,23,.40);
  --radius:14px;
  --radius-sm:9px;
  --radius-lg:22px;
  --font-display:"Playfair Display",Georgia,serif;
  --font-body:"Inter",system-ui,-apple-system,sans-serif;
  --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:64px;
  --bar-h:58px;

  /* statuts & catégories */
  --st-afaire:#9A8C76;
  --st-encours:#B8862C;
  --st-urgent:#C0432B;
  --st-fait:#5C7A5E;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  color:var(--ink);
  background:var(--sand);
  background-image:
    radial-gradient(120% 80% at 50% -10%, #F7F0E0 0%, var(--sand) 55%, var(--sand-deep) 100%);
  background-attachment:fixed;
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;font-size:15px;color:var(--ink);}
a{color:var(--sienna-deep);text-decoration:none;}
::selection{background:var(--sienna);color:#fff;}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:700;line-height:1.12;margin:0;letter-spacing:-.01em;}

/* scrollbars discrets */
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--sand-edge);border-radius:20px;border:2px solid transparent;background-clip:content-box;}

/* ============================================================
   APP SHELL
   ============================================================ */
.app{min-height:100dvh;display:flex;flex-direction:column;}

/* Barre supérieure */
.topbar{
  position:sticky;top:0;z-index:60;
  padding:calc(var(--safe-top) + 10px) 16px 10px;
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(180deg, rgba(251,246,236,.94), rgba(251,246,236,.78));
  backdrop-filter:saturate(140%) blur(14px);
  -webkit-backdrop-filter:saturate(140%) blur(14px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:11px;min-width:0;flex:0 0 auto;}
.brand-mark{
  width:38px;height:38px;border-radius:11px;flex:0 0 auto;
  background:linear-gradient(160deg,#2A2420,#4A3F34);
  display:grid;place-items:center;box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.brand-mark svg{width:24px;height:24px;}
.brand-txt{min-width:0;}
.brand-txt h1{font-size:16px;letter-spacing:-.02em;white-space:nowrap;}
.brand-txt p{margin:0;font-size:11px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;font-weight:600;}

.topbar-spacer{flex:1;}
.icon-btn{
  width:40px;height:40px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto;
  color:var(--ink-soft);border:1px solid transparent;transition:.16s;
}
.icon-btn:hover{background:var(--sand);border-color:var(--line);}
.icon-btn:active{transform:scale(.94);}
.icon-btn svg{width:20px;height:20px;}

/* Recherche globale */
.search-wrap{position:relative;flex:1;max-width:340px;}
.search-wrap input{
  width:100%;height:40px;border-radius:11px;border:1px solid var(--line);
  background:var(--paper);padding:0 14px 0 38px;outline:none;transition:.16s;
}
.search-wrap input:focus{border-color:var(--sienna);box-shadow:0 0 0 3px rgba(184,92,44,.12);}
.search-wrap .s-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.search-wrap .s-ico svg{width:18px;height:18px;display:block;}

.search-results{
  position:absolute;top:48px;left:0;right:0;z-index:80;
  background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow-lg);max-height:60vh;overflow:auto;padding:6px;display:none;
}
.search-results.open{display:block;}
.sr-group-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted-2);font-weight:700;padding:9px 10px 4px;}
.sr-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;}
.sr-item:hover{background:var(--sand);}
.sr-item .sr-ic{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:0 0 auto;font-size:14px;background:var(--sand-deep);}
.sr-item .sr-tx{min-width:0;}
.sr-item .sr-tx b{display:block;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sr-item .sr-tx span{font-size:12px;color:var(--muted);}
.sr-empty{padding:18px;text-align:center;color:var(--muted);font-size:13px;}

/* Navigation principale (haut sur desktop, bas sur mobile) */
.nav{
  display:flex;gap:4px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;
  border-bottom:1px solid var(--line);background:rgba(247,240,224,.5);
  position:sticky;top:calc(var(--safe-top) + 60px);z-index:55;backdrop-filter:blur(8px);
}
.nav::-webkit-scrollbar{display:none;}
.nav-item{
  display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;
  font-size:14px;font-weight:600;color:var(--muted);white-space:nowrap;transition:.16s;flex:0 0 auto;
}
.nav-item svg{width:18px;height:18px;}
.nav-item:hover{color:var(--ink);background:var(--sand);}
.nav-item.active{color:var(--ink);background:var(--paper);box-shadow:var(--shadow);}
.nav-item.active svg{color:var(--sienna);}

/* Contenu */
.main{flex:1;padding:22px 16px calc(40px + var(--safe-bottom));max-width:1180px;margin:0 auto;width:100%;}
.view{display:none;animation:fade .3s ease;}
.view.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* En-tête de section */
.view-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap;}
.view-head .vh-title{display:flex;flex-direction:column;gap:3px;}
.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--sienna);font-weight:700;}
.view-head h2{font-size:30px;}
.view-head .count-pill{font-family:var(--font-mono);font-size:12px;color:var(--muted);}

/* Boutons */
.btn{
  display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 16px;border-radius:11px;
  font-weight:600;font-size:14px;transition:.16s;border:1px solid transparent;white-space:nowrap;
}
.btn svg{width:18px;height:18px;}
.btn-primary{background:var(--ink);color:var(--paper);box-shadow:var(--shadow);}
.btn-primary:hover{background:#000;}
.btn-primary:active{transform:translateY(1px);}
.btn-accent{background:var(--sienna);color:#fff;box-shadow:0 6px 18px -8px rgba(184,92,44,.7);}
.btn-accent:hover{background:var(--sienna-deep);}
.btn-ghost{background:var(--paper);color:var(--ink);border-color:var(--line);}
.btn-ghost:hover{background:var(--sand);border-color:var(--sand-edge);}
.btn-sm{height:34px;padding:0 12px;font-size:13px;border-radius:9px;}
.btn-danger{color:var(--sienna-deep);}
.btn-danger:hover{background:rgba(192,67,43,.1);}

/* Cartes & grilles */
.grid{display:grid;gap:14px;}
.grid-cards{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));}
.card{
  background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);transition:.18s;position:relative;overflow:hidden;
}
.card.click{cursor:pointer;}
.card.click:hover{transform:translateY(-2px);border-color:var(--sand-edge);box-shadow:0 14px 36px -16px rgba(28,25,23,.32);}
.card-strata{height:5px;width:100%;background:linear-gradient(90deg,var(--sienna),var(--sand-edge) 70%);}
.card-body{padding:16px;}

/* Étiquettes / tags */
.tags{display:flex;flex-wrap:wrap;gap:6px;}
.tag{
  display:inline-flex;align-items:center;gap:5px;height:25px;padding:0 9px;border-radius:20px;
  font-size:12px;font-weight:600;background:var(--sand-deep);color:var(--ink-soft);border:1px solid var(--line-soft);
}
.tag.tag-x{cursor:pointer;}
.tag .x{opacity:.5;font-weight:700;}
.tag.sel{background:var(--ink);color:var(--paper);}
.tag.sienna{background:rgba(184,92,44,.14);color:var(--sienna-deep);}
.tag.sage{background:rgba(92,122,94,.16);color:var(--sage-deep);}

/* Pastilles de statut */
.dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;display:inline-block;}
.chip{display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 10px;border-radius:7px;font-size:12px;font-weight:600;}
.chip.afaire{background:rgba(154,140,118,.16);color:#6c604e;}
.chip.encours{background:rgba(184,134,44,.16);color:#8a6312;}
.chip.urgent{background:rgba(192,67,43,.14);color:var(--sienna-deep);}
.chip.fait{background:rgba(92,122,94,.16);color:var(--sage-deep);}

/* Champs de formulaire */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px;}
.field input,.field textarea,.field select{
  width:100%;background:var(--sand);border:1px solid var(--line);border-radius:10px;
  padding:11px 13px;outline:none;transition:.16s;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--sienna);background:var(--paper);box-shadow:0 0 0 3px rgba(184,92,44,.1);}
.field textarea{resize:vertical;min-height:78px;line-height:1.55;}
.field .hint{font-size:11.5px;color:var(--muted-2);margin-top:5px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* Modal / slide-up */
.modal-scrim{
  position:fixed;inset:0;z-index:100;background:rgba(28,25,23,.46);
  backdrop-filter:blur(3px);display:none;opacity:0;transition:opacity .25s;
}
.modal-scrim.open{display:block;opacity:1;}
.modal{
  position:fixed;z-index:101;background:var(--paper);
  left:50%;top:50%;transform:translate(-50%,-46%);width:min(620px,calc(100vw - 32px));
  max-height:88vh;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
  display:none;flex-direction:column;overflow:hidden;opacity:0;transition:.28s cubic-bezier(.2,.8,.2,1);
}
.modal.open{display:flex;opacity:1;transform:translate(-50%,-50%);}
.modal-head{
  padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;
  background:linear-gradient(180deg,var(--paper),rgba(242,234,216,.4));
}
.modal-head h3{font-size:21px;flex:1;min-width:0;}
.modal-body{padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal-foot{padding:14px 20px calc(14px + var(--safe-bottom));border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--paper);}
@media (max-width:600px){
  .modal{left:0;right:0;bottom:0;top:auto;transform:translateY(100%);width:100%;max-height:92vh;
    border-radius:22px 22px 0 0;}
  .modal.open{transform:translateY(0);}
  .field-row{grid-template-columns:1fr;}
}

/* Empty states */
.empty{text-align:center;padding:54px 20px;color:var(--muted);}
.empty svg{width:46px;height:46px;color:var(--sand-edge);margin-bottom:12px;}
.empty h4{font-family:var(--font-display);font-size:20px;color:var(--ink-soft);margin-bottom:6px;}
.empty p{font-size:14px;max-width:340px;margin:0 auto 16px;}

/* Toolbar filtres */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.seg{display:inline-flex;background:var(--sand);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;}
.seg button{padding:7px 13px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);transition:.14s;}
.seg button.on{background:var(--paper);color:var(--ink);box-shadow:var(--shadow);}
.filterbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}

/* ============================================================
   TABLEAU DE BORD
   ============================================================ */
.dash-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;}
.stat{grid-column:span 4;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.stat .stat-num{font-family:var(--font-display);font-size:38px;font-weight:800;line-height:1;letter-spacing:-.02em;}
.stat .stat-lab{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-top:7px;}
.stat .stat-ic{position:absolute;top:14px;right:14px;width:30px;height:30px;color:var(--sand-edge);}
.stat.accent .stat-num{color:var(--sienna);}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.panel-head{padding:15px 17px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.panel-head h3{font-size:18px;}
.panel-head .ph-link{font-size:12.5px;color:var(--sienna-deep);font-weight:600;cursor:pointer;}
.panel-body{padding:8px;}

.graph-card{grid-column:span 7;}
.side-col{grid-column:span 5;display:flex;flex-direction:column;gap:14px;}
.cat-tanks{grid-column:span 12;}

.mini-row{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:10px;cursor:pointer;transition:.14s;}
.mini-row:hover{background:var(--sand);}
.mini-row .mr-main{flex:1;min-width:0;}
.mini-row .mr-main b{font-size:14px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-row .mr-main span{font-size:12px;color:var(--muted);}
.mini-date{font-family:var(--font-mono);font-size:12px;color:var(--muted);text-align:right;flex:0 0 auto;}

.tank-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:6px;}
.tank{background:var(--sand);border:1px solid var(--line);border-radius:11px;padding:13px;}
.tank b{font-family:var(--font-display);font-size:24px;font-weight:700;}
.tank span{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-top:2px;}
.tank .tbar{height:4px;border-radius:3px;margin-top:9px;background:var(--sand-edge);overflow:hidden;}
.tank .tbar i{display:block;height:100%;background:var(--sienna);border-radius:3px;}

/* Graphe de connexions (SVG) */
#graphSvg{width:100%;height:340px;display:block;}
#graphSvg .edge{stroke:var(--sand-edge);stroke-linecap:round;transition:.2s;}
#graphSvg .edge.hot{stroke:var(--sienna);}
#graphSvg .node-c{cursor:pointer;}
#graphSvg .node-c:hover circle{filter:brightness(.96);}
#graphSvg .node-lab{font-family:var(--font-body);font-weight:700;font-size:13px;fill:var(--paper);text-anchor:middle;}
#graphSvg .node-cnt{font-family:var(--font-display);font-weight:800;font-size:19px;fill:var(--paper);text-anchor:middle;}
#graphSvg .edge-lab{font-family:var(--font-mono);font-size:10px;fill:var(--muted);text-anchor:middle;}

/* ============================================================
   FRISE / TIMELINE (Tâches)
   ============================================================ */
.timeline-wrap{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.tl-monthbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);}
.tl-monthbar h3{font-size:19px;text-transform:capitalize;}
.tl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tl-inner{min-width:max-content;}
.tl-days{display:flex;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);z-index:2;}
.tl-day{width:42px;flex:0 0 42px;text-align:center;padding:7px 0;border-left:1px solid var(--line-soft);}
.tl-day.wknd{background:rgba(231,219,194,.4);}
.tl-day.today{background:rgba(184,92,44,.1);}
.tl-day .d-dow{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;}
.tl-day .d-num{font-size:14px;font-weight:700;}
.tl-day.today .d-num{color:var(--sienna);}
.tl-lane-label{padding:9px 14px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);background:var(--sand);border-bottom:1px solid var(--line-soft);position:sticky;left:0;}
.tl-row{display:flex;align-items:center;min-height:46px;border-bottom:1px solid var(--line-soft);position:relative;}
.tl-grid{display:flex;position:absolute;inset:0;pointer-events:none;}
.tl-grid i{width:42px;flex:0 0 42px;border-left:1px solid var(--line-soft);}
.tl-grid i.wknd{background:rgba(231,219,194,.25);}
.tl-bar{
  position:absolute;height:30px;top:8px;border-radius:8px;display:flex;align-items:center;gap:7px;
  padding:0 9px;color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;box-shadow:var(--shadow);
  overflow:hidden;white-space:nowrap;z-index:1;
}
.tl-bar .tb-check{width:16px;height:16px;border-radius:5px;border:1.5px solid rgba(255,255,255,.7);display:grid;place-items:center;flex:0 0 auto;background:rgba(255,255,255,.12);}
.tl-bar.done{opacity:.55;text-decoration:line-through;}
.tl-bar.done .tb-check{background:#fff;color:var(--ink);}
.tl-empty-lane{padding:14px;color:var(--muted-2);font-size:13px;font-style:italic;}

/* Kanban */
.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
.kan-col{flex:0 0 270px;background:rgba(247,240,224,.6);border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;max-height:70vh;}
.kan-col-head{padding:12px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line);font-weight:700;}
.kan-col-head .kc-count{margin-left:auto;font-family:var(--font-mono);font-size:12px;color:var(--muted);}
.kan-list{padding:10px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;}
.kan-card{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:12px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;}
.kan-card:hover{transform:translateY(-2px);border-color:var(--sand-edge);}
.kan-card b{font-size:14px;display:block;margin-bottom:4px;}
.kan-card .kc-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:8px;}

/* ============================================================
   AGENDA
   ============================================================ */
.cal{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.cal-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line);}
.cal-head h3{font-size:20px;text-transform:capitalize;}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--line);}
.cal-dow div{text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:8px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{min-height:84px;border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);padding:5px;cursor:pointer;transition:.12s;position:relative;}
.cal-cell:hover{background:var(--sand);}
.cal-cell.out{background:rgba(231,219,194,.22);}
.cal-cell .cc-num{font-size:13px;font-weight:600;color:var(--ink-soft);}
.cal-cell.today .cc-num{background:var(--sienna);color:#fff;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;}
.cal-cell.out .cc-num{color:var(--muted-2);}
.cc-ev{margin-top:3px;font-size:10.5px;font-weight:600;padding:2px 5px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-cell .cc-more{font-size:10px;color:var(--muted);margin-top:2px;}
@media (max-width:600px){.cal-cell{min-height:58px;}.cc-ev{font-size:9px;}}

.ev-type-colloque{background:rgba(184,92,44,.16);color:var(--sienna-deep);}
.ev-type-rdv{background:rgba(92,122,94,.18);color:var(--sage-deep);}
.ev-type-terrain{background:rgba(139,94,44,.18);color:#7a4f15;}
.ev-type-deadline{background:rgba(192,67,43,.16);color:var(--sienna-deep);}
.ev-type-soutenance{background:rgba(28,25,23,.12);color:var(--ink);}
.ev-type-autre{background:var(--sand-deep);color:var(--ink-soft);}

/* ============================================================
   DÉTAIL FICHE (panneau dans modal)
   ============================================================ */
.detail-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:4px 0 16px;}
.dm{background:var(--sand);border:1px solid var(--line-soft);border-radius:10px;padding:10px 12px;}
.dm .dm-l{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;}
.dm .dm-v{font-size:14px;font-weight:600;margin-top:2px;word-break:break-word;}
.dm .dm-v.mono{font-family:var(--font-mono);font-size:13px;}
.dm a.dm-v{color:var(--sienna-deep);cursor:pointer;}
.detail-sec{margin-top:18px;}
.detail-sec h4{font-size:14px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-family:var(--font-body);font-weight:800;margin-bottom:9px;display:flex;align-items:center;gap:8px;}
.detail-sec h4::after{content:"";flex:1;height:1px;background:var(--line);}
.link-chip{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;background:var(--sand);border:1px solid var(--line);border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:.14s;margin:0 6px 6px 0;}
.link-chip:hover{background:var(--paper);border-color:var(--sienna);color:var(--sienna-deep);}
.link-chip svg{width:15px;height:15px;color:var(--muted);}
.notes-block{background:var(--sand);border:1px solid var(--line-soft);border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.6;color:var(--ink-soft);white-space:pre-wrap;}
.ai-summary{background:linear-gradient(160deg,rgba(92,122,94,.1),rgba(92,122,94,.04));border:1px solid rgba(92,122,94,.25);border-radius:11px;padding:14px;font-size:14px;line-height:1.6;white-space:pre-wrap;}
.member-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.member-row input{flex:1;}

/* Multi-select tags dans formulaires */
.tag-input-wrap{border:1px solid var(--line);border-radius:10px;background:var(--sand);padding:8px;}
.tag-input-wrap input{border:none;background:transparent;outline:none;width:100%;padding:5px 4px;}
.tag-suggest{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.tag-suggest .tag{cursor:pointer;}

/* Toast */
.toast-wrap{position:fixed;left:50%;bottom:calc(20px + var(--safe-bottom) + var(--nav-h));transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;}
.toast{background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:11px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);animation:toastIn .3s ease;display:flex;align-items:center;gap:9px;}
.toast.ok .ti{color:var(--sage);}
.toast.err{background:var(--sienna-deep);}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* ============================================================
   NAV MOBILE (bas)
   ============================================================ */
.mobile-nav{display:none;}
@media (max-width:768px){
  .nav{display:none;}
  .search-wrap{max-width:none;}
  .brand-txt p{display:none;}
  .view-head h2{font-size:25px;}
  .dash-grid .stat{grid-column:span 6;}
  .graph-card,.side-col,.cat-tanks{grid-column:span 12;}
  .mobile-nav{
    display:flex;position:fixed;left:0;right:0;bottom:0;z-index:70;height:calc(var(--nav-h) + var(--safe-bottom));
    padding-bottom:var(--safe-bottom);
    background:linear-gradient(180deg,rgba(251,246,236,.85),var(--paper));
    backdrop-filter:saturate(150%) blur(16px);-webkit-backdrop-filter:saturate(150%) blur(16px);
    border-top:1px solid var(--line);justify-content:space-around;align-items:stretch;
  }
  .mn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:10px;font-weight:600;}
  .mn-item svg{width:22px;height:22px;}
  .mn-item.active{color:var(--sienna);}
  .main{padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 30px);}
  .toast-wrap{bottom:calc(20px + var(--safe-bottom) + var(--nav-h));}
  .dash-grid{gap:10px;}
}
@media (min-width:769px){.mobile-nav{display:none;}}

.hidden{display:none !important;}
.muted{color:var(--muted);}
.mono{font-family:var(--font-mono);}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
.spinner.dark{border-color:rgba(28,25,23,.2);border-top-color:var(--ink);}
@keyframes spin{to{transform:rotate(360deg);}}

<script>
/* ============================================================
   1 · DONNÉES — schéma, stockage localStorage, utilitaires
   ============================================================
   Schéma JSON (version 2) :
   {
     version, exportedAt,
     contacts:    [{id,nom,prenom,specialite,institution,laboratoire,mail,telephone,
                    statutRelation,tags[],notes,siteIds[],associationIds[],createdAt}]
     associations:[{id,nom,adresse,mail,presidentNom,presidentMail,specialite,
                    membres[{nom,mail}],siteWeb,articles[{titre,url}],tags[],notes,
                    contactIds[],createdAt}]
     sites:       [{id,nom,region,province,lat,lng,traditions[],periode,notes,
                    contactId,statut,tags[],createdAt}]
     tasks:       [{id,titre,description,dateDebut,dateFin,statut,categorie,type,createdAt}]
     events:      [{id,titre,date,type,lieu,notes,contactId,associationId,createdAt}]
     tags:        [..global..]
     traditions:  [..stylistiques..]
     settings:    {googleClientId, anthropicKey}
   }
   ============================================================ */

const STORE_KEY = 'these-archeo-data-v2';

const TASK_STATUSES = ['À faire','En cours','Urgent','Fait'];
const STATUS_CLASS  = {'À faire':'afaire','En cours':'encours','Urgent':'urgent','Fait':'fait'};
const STATUS_COLOR  = {'À faire':'#9A8C76','En cours':'#B8862C','Urgent':'#C0432B','Fait':'#5C7A5E'};
const TASK_CATS     = ['Colloque','Papier','Terrain','Association','RDV','Thèse','Autre'];
const CAT_COLOR     = {Colloque:'#B85C2C',Papier:'#8A6312',Terrain:'#7a4f15',Association:'#5C7A5E',RDV:'#466',Thèse:'#1C1917',Autre:'#9A8C76'};
const EVENT_TYPES   = ['colloque','rdv','terrain','deadline','soutenance','autre'];
const EVENT_LABEL   = {colloque:'Colloque',rdv:'RDV',terrain:'Terrain',deadline:'Deadline',soutenance:'Soutenance',autre:'Autre'};
const SITE_STATUSES = ['Prospecté','À prospecter','En cours d\u2019étude'];
const CONTACT_REL   = ['Rencontré','En attente','À revoir'];
const DEFAULT_TRADITIONS = ['Tazina','Libyco-Berbère','Gravures rupestres','Peintures','Néolithique'];

let DB = null;

function emptyDB(){
  return {version:2, exportedAt:null, contacts:[], associations:[], sites:[],
          tasks:[], events:[], tags:[], traditions:[...DEFAULT_TRADITIONS],
          settings:{googleClientId:'', anthropicKey:''}};
}

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ DB = Object.assign(emptyDB(), JSON.parse(raw)); }
    else{ DB = emptyDB(); seedExample(); save(); }
  }catch(e){ console.error('Lecture localStorage', e); DB = emptyDB(); }
  if(!DB.traditions || !DB.traditions.length) DB.traditions = [...DEFAULT_TRADITIONS];
  if(!DB.settings) DB.settings = {googleClientId:'', anthropicKey:''};
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }
  catch(e){ toast('Stockage saturé — exportez vos données','err'); }
}

/* ---- utilitaires ---- */
const $  = id => document.getElementById(id);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const JOURS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function isoToFr(iso){ if(!iso) return '—'; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function isoToShort(iso){ if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${d}/${m}`; }
function monthLabel(d){ return `${MOIS[d.getMonth()]} ${d.getFullYear()}`; }
function dim(y,m){ return new Date(y,m+1,0).getDate(); } // jours du mois
function firstDow(y,m){ return (new Date(y,m,1).getDay()+6)%7; } // lundi=0

function toast(msg,type){
  const w=$('toastWrap'); const t=document.createElement('div');
  t.className='toast '+(type==='err'?'err':type==='ok'?'ok':'');
  t.innerHTML=(type==='ok'?'<span class="ti">✓</span>':'')+esc(msg);
  w.appendChild(t); setTimeout(()=>{t.style.opacity='0';t.style.transition='.3s';setTimeout(()=>t.remove(),300);},2600);
}

/* ---- lookups ---- */
const getContact = id => DB.contacts.find(c=>c.id===id);
const getAssoc   = id => DB.associations.find(a=>a.id===id);
const getSite    = id => DB.sites.find(s=>s.id===id);
const contactName = c => c ? `${c.prenom||''} ${c.nom||''}`.trim()||'(sans nom)' : '—';

/* ---- état de navigation / filtres ---- */
const state = {
  view:'dashboard', taskView:'frise',
  taskMonth:new Date(new Date().getFullYear(),new Date().getMonth(),1),
  taskCat:'all',
  agendaMonth:new Date(new Date().getFullYear(),new Date().getMonth(),1),
  contactTag:null, assocTag:null, siteTrad:null,
  editType:null, editId:null,
  detailType:null, detailId:null,
};

/* ============================================================
   Navigation entre vues
   ============================================================ */
function go(view){
  state.view=view;
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active', v.id==='view-'+view));
  document.querySelectorAll('.nav-item,.mn-item').forEach(n=>n.classList.toggle('active', n.dataset.view===view));
  closeSearch();
  window.scrollTo({top:0,behavior:'smooth'});
  render(view);
}
function render(view){
  if(view==='dashboard') renderDashboard();
  else if(view==='tasks') renderTasks();
  else if(view==='agenda') renderAgenda();
  else if(view==='contacts') renderContacts();
  else if(view==='assocs') renderAssocs();
  else if(view==='sites') renderSites();
}
function renderCurrent(){ render(state.view); }

function openModal(title, bodyHtml, footHtml){
  $('modalTitle').innerHTML=title;
  $('modalBody').innerHTML=bodyHtml;
  $('modalFoot').innerHTML=footHtml||'';
  $('scrim').classList.add('open');
  $('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  $('scrim').classList.remove('open');
  $('modal').classList.remove('open');
  document.body.style.overflow='';

}

/* éditeur de tags réutilisable : renvoie le HTML, gère un tableau temporaire */
let _formTags = [];
function tagEditor(current, pool){
  _formTags = [...(current||[])];
  const suggestions = [...new Set([...(pool||DB.tags), ...DB.tags])].filter(t=>!_formTags.includes(t));
  return `<div class="tag-input-wrap">
    <div class="tags" id="ftTags">${_formTags.map(t=>tagPill(t)).join('')}</div>
    <input id="ftInput" placeholder="Ajouter une étiquette + Entrée" onkeydown="if(event.key==='Enter'){event.preventDefault();addFormTag(this.value);this.value='';}">
    <div class="tag-suggest" id="ftSuggest">${suggestions.slice(0,12).map(t=>`<span class="tag" onclick="addFormTag('${esc(t)}')">＋ ${esc(t)}</span>`).join('')}</div>
  </div>`;
}
function tagPill(t){ return `<span class="tag tag-x" onclick="removeFormTag('${esc(t)}')">#${esc(t)} <span class="x">×</span></span>`; }
function addFormTag(t){ t=t.trim().replace(/^#/,''); if(!t||_formTags.includes(t))return; _formTags.push(t); $('ftTags').innerHTML=_formTags.map(tagPill).join(''); const s=$('ftSuggest'); if(s){const el=[...s.children].find(c=>c.textContent.includes(t)); if(el)el.remove();} }
function removeFormTag(t){ _formTags=_formTags.filter(x=>x!==t); $('ftTags').innerHTML=_formTags.map(tagPill).join(''); }

/* multi-sélecteur de traditions stylistiques (sites) */
let _formTrad=[];
function tradEditor(current){
  _formTrad=[...(current||[])];
  const all=[...new Set([...DB.traditions, ..._formTrad])];
  return `<div class="tag-input-wrap">
    <div class="tags" id="trTags">${all.map(t=>`<span class="tag ${_formTrad.includes(t)?'sel':''}" onclick="toggleTrad('${esc(t)}')">${esc(t)}</span>`).join('')}</div>
    <input id="trInput" placeholder="Créer une tradition + Entrée" onkeydown="if(event.key==='Enter'){event.preventDefault();createTrad(this.value);this.value='';}">
  </div>`;
}
function toggleTrad(t){ if(_formTrad.includes(t))_formTrad=_formTrad.filter(x=>x!==t); else _formTrad.push(t); refreshTrad(); }
function createTrad(t){ t=t.trim(); if(!t)return; if(!DB.traditions.includes(t))DB.traditions.push(t); if(!_formTrad.includes(t))_formTrad.push(t); refreshTrad(); }
function refreshTrad(){ const all=[...new Set([...DB.traditions,..._formTrad])]; $('trTags').innerHTML=all.map(t=>`<span class="tag ${_formTrad.includes(t)?'sel':''}" onclick="toggleTrad('${esc(t)}')">${esc(t)}</span>`).join(''); }

/* enregistre globalement les nouveaux tags */
function commitTags(arr){ arr.forEach(t=>{ if(!DB.tags.includes(t)) DB.tags.push(t); }); }

function selectField(label, id, options, value, extra){
  return `<div class="field"><label>${label}</label><select id="${id}" ${extra||''}>${options.map(o=>{
    const v=typeof o==='object'?o.v:o, l=typeof o==='object'?o.l:o;
    return `<option value="${esc(v)}" ${v===value?'selected':''}>${esc(l)}</option>`;}).join('')}</select></div>`;
}

function linkCounts(){
  const siteContact = DB.sites.filter(s=>s.contactId).length;
  const contactAssoc = DB.contacts.reduce((n,c)=>n+((c.associationIds||[]).length),0)
                      + DB.associations.reduce((n,a)=>n+((a.contactIds||[]).length),0);
  const contactAgenda = DB.events.filter(e=>e.contactId).length;
  const assocAgenda = DB.events.filter(e=>e.associationId).length;
  const taskAgenda = DB.events.filter(e=>e.type==='deadline').length + DB.tasks.filter(t=>t.type==='fixe').length;
  return {siteContact, contactAssoc:Math.round(contactAssoc/1)||0, contactAgenda, assocAgenda, taskAgenda};
}

function connectionGraphSVG(){
  const L=linkCounts();
  const N={
    contacts:{x:300,y:165,r:46,c:'#5C7A5E',lab:'Contacts',cnt:DB.contacts.length},
    sites:{x:110,y:80,r:42,c:'#B85C2C',lab:'Sites',cnt:DB.sites.length},
    assocs:{x:490,y:80,r:42,c:'#2A2420',lab:'Assoc.',cnt:DB.associations.length},
    agenda:{x:470,y:270,r:40,c:'#8A6312',lab:'Agenda',cnt:DB.events.length},
    tasks:{x:130,y:270,r:40,c:'#9A4A20',lab:'Tâches',cnt:DB.tasks.length},
  };
  const E=[
    ['contacts','sites',L.siteContact],
    ['contacts','assocs',L.contactAssoc],
    ['contacts','agenda',L.contactAgenda],
    ['assocs','agenda',L.assocAgenda],
    ['tasks','agenda',L.taskAgenda],
  ];
  const edges=E.map(([a,b,w])=>{
    const A=N[a],B=N[b];
    const mx=(A.x+B.x)/2, my=(A.y+B.y)/2;
    const sw=Math.max(1.5, Math.min(9, 1.5+w*1.3));
    return `<line class="edge ${w>0?'hot':''}" x1="${A.x}" y1="${A.y}" x2="${B.x}" y2="${B.y}" stroke-width="${sw}"/>
      ${w>0?`<text class="edge-lab" x="${mx}" y="${my-5}">${w}</text>`:''}`;
  }).join('');
  const nodes=Object.entries(N).map(([k,n])=>`
    <g class="node-c" onclick="go('${k==='assocs'?'assocs':k}')">
      <circle cx="${n.x}" cy="${n.y}" r="${n.r}" fill="${n.c}"/>
      <text class="node-cnt" x="${n.x}" y="${n.y-2}">${n.cnt}</text>
      <text class="node-lab" x="${n.x}" y="${n.y+16}">${n.lab}</text>
    </g>`).join('');
  return `<svg id="graphSvg" viewBox="0 0 600 340" preserveAspectRatio="xMidYMid meet">${edges}${nodes}</svg>`;
}
/* ============================================================
   6 · TÂCHES — frise chronologique + Kanban
   ============================================================ */
function setTaskView(v){
  state.taskView=v;
  $('segFrise').classList.toggle('on',v==='frise');
  $('segKanban').classList.toggle('on',v==='kanban');
  $('taskFriseArea').classList.toggle('hidden',v!=='frise');
  $('taskKanbanArea').classList.toggle('hidden',v!=='kanban');
  renderTasks();
}
function renderTasks(){
  // filtres catégorie
  const cats=['all',...TASK_CATS];
  $('taskCatFilter').innerHTML = cats.map(c=>`<span class="tag ${state.taskCat===c?'sel':''}" onclick="state.taskCat='${c==='all'?'all':c}';renderTasks()">${c==='all'?'Toutes catégories':esc(c)}</span>`).join('');
  if(state.taskView==='frise') renderFrise(); else renderKanban();
}
function visibleTasks(){
  return DB.tasks.filter(t=>state.taskCat==='all'||t.categorie===state.taskCat);
}

function renderFrise(){
  const d=state.taskMonth, y=d.getFullYear(), m=d.getMonth();
  const ndays=dim(y,m), pad=n=>String(n).padStart(2,'0');
  const mStart=`${y}-${pad(m+1)}-01`, mEnd=`${y}-${pad(m+1)}-${pad(ndays)}`;
  const today=todayISO();
  const COLW=42;

  const dayHeader = Array.from({length:ndays},(_,i)=>{
    const day=i+1, iso=`${y}-${pad(m+1)}-${pad(day)}`;
    const dow=(new Date(y,m,day).getDay()+6)%7, wknd=dow>=5;
    return `<div class="tl-day ${wknd?'wknd':''} ${iso===today?'today':''}">
      <div class="d-dow">${JOURS[dow][0]}</div><div class="d-num">${day}</div></div>`;
  }).join('');
  const gridBg = Array.from({length:ndays},(_,i)=>{
    const dow=(new Date(y,m,i+1).getDay()+6)%7; return `<i class="${dow>=5?'wknd':''}"></i>`;}).join('');

  const lane = (type, label) => {
    const items = visibleTasks().filter(t=>t.type===type && t.dateFin>=mStart && t.dateDebut<=mEnd);
    let rows;
    if(!items.length){ rows=`<div class="tl-empty-lane">Aucune tâche ${type==='fixe'?'jalon':'précise'} ce mois-ci.</div>`; }
    else rows=items.sort((a,b)=>a.dateDebut.localeCompare(b.dateDebut)).map(t=>{
      const s = t.dateDebut<mStart?mStart:t.dateDebut;
      const e = t.dateFin>mEnd?mEnd:t.dateFin;
      const si=parseInt(s.slice(8))-1, ei=parseInt(e.slice(8))-1;
      const left=si*COLW+2, width=(ei-si+1)*COLW-4;
      const done=t.statut==='Fait';
      return `<div class="tl-row">
        <div class="tl-grid">${gridBg}</div>
        <div class="tl-bar ${done?'done':''}" style="left:${left}px;width:${width}px;background:${STATUS_COLOR[t.statut]}" onclick="openTaskDetail('${t.id}')">
          <span class="tb-check" onclick="event.stopPropagation();toggleTaskDone('${t.id}')">${done?'✓':''}</span>
          <span style="overflow:hidden;text-overflow:ellipsis">${esc(t.titre)}</span>
        </div></div>`;
    }).join('');
    return `<div class="tl-lane-label">${label}</div>${rows}`;
  };

  $('taskFriseArea').innerHTML = `
    <div class="timeline-wrap">
      <div class="tl-monthbar">
        <button class="icon-btn" onclick="shiftTaskMonth(-1)"><svg viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <h3>${monthLabel(d)}</h3>
        <div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="state.taskMonth=new Date(new Date().getFullYear(),new Date().getMonth(),1);renderTasks()">Aujourd'hui</button>
        <button class="icon-btn" onclick="shiftTaskMonth(1)"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>
      </div>
      <div class="tl-scroll"><div class="tl-inner" style="width:${ndays*COLW}px">
        <div class="tl-days">${dayHeader}</div>
        ${lane('fixe','◆ Tâches fixes — jalons de thèse')}
        ${lane('precise','• Tâches précises — actions')}
      </div></div>
    </div>
    ${visibleTasks().length===0?emptyState('Aucune tâche','Créez vos jalons de thèse et vos actions quotidiennes.','editTask()'):''}`;
}
function shiftTaskMonth(n){ const d=state.taskMonth; state.taskMonth=new Date(d.getFullYear(),d.getMonth()+n,1); renderTasks(); }

function renderKanban(){
  const cols = TASK_STATUSES.map(st=>{
    const items=visibleTasks().filter(t=>t.statut===st);
    return `<div class="kan-col">
      <div class="kan-col-head"><span class="dot" style="background:${STATUS_COLOR[st]}"></span>${st}<span class="kc-count">${items.length}</span></div>
      <div class="kan-list">${items.map(t=>`
        <div class="kan-card" onclick="openTaskDetail('${t.id}')">
          <b>${esc(t.titre)}</b>
          ${t.description?`<div class="muted" style="font-size:12.5px">${esc(t.description).slice(0,80)}</div>`:''}
          <div class="kc-meta">
            <span class="tag" style="height:21px;background:${CAT_COLOR[t.categorie]}22;color:${CAT_COLOR[t.categorie]}">${esc(t.categorie)}</span>
            ${t.dateFin?`<span class="mono">→ ${isoToShort(t.dateFin)}</span>`:''}
            <span class="tag" style="height:21px">${t.type==='fixe'?'◆ jalon':'• action'}</span>
          </div></div>`).join('')||'<div class="tl-empty-lane">—</div>'}</div>
    </div>`;
  }).join('');
  $('taskKanbanArea').innerHTML=`<div class="kanban">${cols}</div>`;
}

function toggleTaskDone(id){
  const t=DB.tasks.find(x=>x.id===id); if(!t)return;
  t.statut = t.statut==='Fait'?'À faire':'Fait'; save(); renderTasks();
  toast(t.statut==='Fait'?'Tâche terminée ✓':'Tâche réouverte');
}

  const body=`

    <div class="field"><label>Description</label><textarea id="f_desc" placeholder="Détails…">${esc(t?.description||'')}</textarea></div>
    <div class="field-row">
      <div class="field"><label>Date de début</label><input id="f_deb" type="date" value="${t?.dateDebut||todayISO()}"></div>
      <div class="field"><label>Date de fin</label><input id="f_fin" type="date" value="${t?.dateFin||t?.dateDebut||todayISO()}"></div>
    </div>

   7 · AGENDA — calendrier mensuel + liste
   ============================================================ */
function renderAgenda(){
  const d=state.agendaMonth, y=d.getFullYear(), m=d.getMonth();
  const ndays=dim(y,m), start=firstDow(y,m), pad=n=>String(n).padStart(2,'0');
  const today=todayISO();
  const evByDay={};
  DB.events.forEach(e=>{ if(e.date&&e.date.startsWith(`${y}-${pad(m+1)}`)){ (evByDay[parseInt(e.date.slice(8))] ||= []).push(e); }});

  let cells='';
  // jours du mois précédent
  const prevDays=dim(y,m-1);
  for(let i=0;i<start;i++){ cells+=`<div class="cal-cell out"><div class="cc-num">${prevDays-start+i+1}</div></div>`; }
  for(let day=1;day<=ndays;day++){
    const iso=`${y}-${pad(m+1)}-${pad(day)}`;
    const evs=(evByDay[day]||[]).sort((a,b)=>a.titre.localeCompare(b.titre));
    const shown=evs.slice(0,3).map(e=>`<div class="cc-ev ev-type-${e.type}" onclick="event.stopPropagation();openEventDetail('${e.id}')">${esc(e.titre)}</div>`).join('');
    const more=evs.length>3?`<div class="cc-more">+${evs.length-3}</div>`:'';
    cells+=`<div class="cal-cell ${iso===today?'today':''}" onclick="editEvent(null,'${iso}')"><div class="cc-num">${day}</div>${shown}${more}</div>`;
  }
  const totalCells=start+ndays, trailing=(7-(totalCells%7))%7;
  for(let i=1;i<=trailing;i++){ cells+=`<div class="cal-cell out"><div class="cc-num">${i}</div></div>`; }

  const monthEvents=DB.events.filter(e=>e.date&&e.date.startsWith(`${y}-${pad(m+1)}`)).sort((a,b)=>a.date.localeCompare(b.date));

  $('agendaArea').innerHTML=`
    <div class="cal">
      <div class="cal-head">
        <button class="icon-btn" onclick="shiftAgendaMonth(-1)"><svg viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <h3>${monthLabel(d)}</h3>
        <div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="state.agendaMonth=new Date(new Date().getFullYear(),new Date().getMonth(),1);renderAgenda()">Aujourd'hui</button>
        <button class="icon-btn" onclick="shiftAgendaMonth(1)"><svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>
      </div>
      <div class="cal-dow">${JOURS.map(j=>`<div>${j}</div>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
    </div>
    <div class="panel" style="margin-top:14px">
      <div class="panel-head"><h3>Événements du mois</h3><span class="ph-link mono">${monthEvents.length}</span></div>
      <div class="panel-body">${ monthEvents.length? monthEvents.map(e=>{
        const c=e.contactId?getContact(e.contactId):null, a=e.associationId?getAssoc(e.associationId):null;
        return `<div class="mini-row" onclick="openEventDetail('${e.id}')">
          <span class="chip ev-type-${e.type}">${EVENT_LABEL[e.type]||e.type}</span>
          <div class="mr-main"><b>${esc(e.titre)}</b><span>${esc(e.lieu||'')}${c?' · '+esc(contactName(c)):''}${a?' · '+esc(a.nom):''}</span></div>
          <div class="mini-date">${isoToFr(e.date)}</div></div>`;}).join('')
        : '<div class="empty" style="padding:30px"><p>Aucun événement ce mois-ci. Touchez une date pour en ajouter.</p></div>' }</div>
    </div>`;
}

function saveContact(){
  const nom=$('f_nom').value.trim(), prenom=$('f_prenom').value.trim();
  if(!nom&&!prenom){toast('Nom requis','err');return;}
  commitTags(_formTags);
  const data={nom,prenom,specialite:$('f_spec').value.trim(),institution:$('f_inst').value.trim(),
    laboratoire:$('f_lab').value.trim(),mail:$('f_mail').value.trim(),telephone:$('f_tel').value.trim(),
    statutRelation:$('f_rel').value,tags:[..._formTags],notes:$('f_notes').value.trim(),
    siteIds:[..._formSites],associationIds:[..._formAssocs]};
  let cid;
  if(state.editId){ cid=state.editId; Object.assign(getContact(cid),data); }
  else { cid=uid(); DB.contacts.push({id:cid,...data,createdAt:todayISO()}); }
  syncContactAssoc(cid,_formAssocs);
  save(); closeModal(); renderContacts(); toast('Contact enregistré','ok');
}
function syncContactAssoc(contactId, assocIds){
  DB.associations.forEach(a=>{
    a.contactIds=a.contactIds||[];
    const should=assocIds.includes(a.id), has=a.contactIds.includes(contactId);
    if(should&&!has) a.contactIds.push(contactId);
    if(!should&&has) a.contactIds=a.contactIds.filter(x=>x!==contactId);
  });
}

  DB.associations.forEach(a=>{ a.contactIds=(a.contactIds||[]).filter(x=>x!==id); });

/* sélecteur multi (chips) générique : 'site' ou 'assoc' */
function chipsSelector(kind, options, selected){
  if(!options.length) return `<div class="muted" style="font-size:13px;padding:4px 0">Aucun élément à lier pour l'instant.</div>`;
  return `<div class="tags" id="cs_${kind}">${options.map(o=>`<span class="tag ${selected.includes(o.v)?'sel':''}" onclick="toggleChip('${kind}','${o.v}')">${esc(o.l)}</span>`).join('')}</div>`;
}
function toggleChip(kind,v){
  const arr = kind==='site'?_formSites : kind==='assoc'?_formAssocs : kind==='siteContact'?_formSiteContacts : null;
  const i=arr.indexOf(v); if(i>=0)arr.splice(i,1); else arr.push(v);
  const opts = kind==='site'?DB.sites.map(s=>({v:s.id,l:s.nom})) : DB.associations.map(a=>({v:a.id,l:a.nom}));
  $('cs_'+kind).innerHTML = opts.map(o=>`<span class="tag ${arr.includes(o.v)?'sel':''}" onclick="toggleChip('${kind}','${o.v}')">${esc(o.l)}</span>`).join('');
}

let _gisToken=null, _gisClient=null;
function loadScript(src){
  return new Promise((res,rej)=>{
    if([...document.scripts].some(s=>s.src===src)) return res();
    const el=document.createElement('script'); el.src=src; el.async=true;
    el.onload=()=>res(); el.onerror=()=>rej(new Error('\u00c9chec du chargement de '+src));
    document.head.appendChild(el);
  });
}
function getGmailToken(clientId){
  return loadScript('https://accounts.google.com/gsi/client').then(()=>new Promise((resolve,reject)=>{
    try{
      _gisClient = google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: 'https://www.googleapis.com/auth/gmail.readonly',
        callback: (resp)=>{ if(resp&&resp.access_token){ _gisToken=resp.access_token; resolve(resp.access_token); } else reject(new Error('Autorisation Google refus\u00e9e')); },
        error_callback: ()=>reject(new Error('Connexion Google annul\u00e9e'))
      });
      _gisClient.requestAccessToken({prompt: _gisToken?'':'consent'});
    }catch(e){ reject(e); }
  }));
}
async function anthropicComplete(apiKey, prompt, maxTokens){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTokens||1024,messages:[{role:'user',content:prompt}]})
  });
  if(!r.ok){ const t=await r.text().catch(()=>''); throw new Error('Erreur API IA ('+r.status+') '+t.slice(0,160)); }
  const d=await r.json();
  return (d.content||[]).filter(x=>x.type==='text').map(x=>x.text).join('\n').trim();
}
function aiBox(head, text){
  return `<div class="ai-summary"><div class="ai-head"><svg viewBox="0 0 24 24" fill="none" width="15" height="15"><path d="M12 3l2 5 5 2-5 2-2 5-2-5-5-2 5-2 2-5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>${esc(head)}</div><div class="ai-body">${esc(text).replace(/\n/g,'<br>')}</div></div>`;
}

async function gmailSummary(contactId){
  const c=getContact(contactId); if(!c)return;
  const out=$('gmailResult'), btn=$('gmailBtn');
  const clientId=((DB.settings&&DB.settings.googleClientId)||'').trim();
  const apiKey=((DB.settings&&DB.settings.anthropicKey)||'').trim();
  if(!c.mail){ out.innerHTML=`<div class="info-box warn">Ce contact n'a pas d'adresse mail renseign\u00e9e.</div>`; return; }
  if(!clientId){ out.innerHTML=`<div class="info-box warn">Identifiant client Google manquant. <a onclick="closeModal();openSettings()">Ouvrir les r\u00e9glages \u2192</a></div>`; return; }
  if(!apiKey){ out.innerHTML=`<div class="info-box warn">Cl\u00e9 API Anthropic manquante. <a onclick="closeModal();openSettings()">Ouvrir les r\u00e9glages \u2192</a></div>`; return; }
  const busy=(label)=>{ if(btn)btn.disabled=true; out.innerHTML=`<div class="loading"><span class="spinner"></span>${esc(label)}</div>`; };
  try{
    busy('Connexion \u00e0 Gmail\u2026');
    const token=await getGmailToken(clientId);
    busy('Recherche des \u00e9changes\u2026');
    const q=encodeURIComponent(`{from:${c.mail} to:${c.mail}}`);
    const listResp=await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages?q=${q}&maxResults=15`,{headers:{Authorization:'Bearer '+token}});
    if(!listResp.ok) throw new Error('Erreur Gmail ('+listResp.status+')');
    const ids=((await listResp.json()).messages||[]).map(m=>m.id);
    if(!ids.length){ out.innerHTML=`<div class="info-box">Aucun \u00e9change trouv\u00e9 avec ${esc(c.mail)}.</div>`; if(btn)btn.disabled=false; return; }
    busy(`Lecture de ${ids.length} message${ids.length>1?'s':''}\u2026`);
    const msgs=[];
    for(const mid of ids.slice(0,15)){
      const r=await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${mid}?format=metadata&metadataHeaders=From&metadataHeaders=To&metadataHeaders=Subject&metadataHeaders=Date`,{headers:{Authorization:'Bearer '+token}});
      if(!r.ok) continue;
      const d=await r.json();
      const h=Object.fromEntries((d.payload&&d.payload.headers||[]).map(x=>[x.name,x.value]));
      msgs.push({date:h.Date||'',from:h.From||'',to:h.To||'',subject:h.Subject||'',snippet:d.snippet||''});
    }
    msgs.sort((a,b)=>new Date(a.date)-new Date(b.date));
    busy('G\u00e9n\u00e9ration du r\u00e9sum\u00e9 (IA)\u2026');
    const corpus=msgs.map(m=>`\u2014 [${m.date}] ${m.subject}\nDe: ${m.from} | \u00c0: ${m.to}\n${m.snippet}`).join('\n\n');
    const prompt=`Tu es l'assistant d'un doctorant en arch\u00e9ologie (art rupestre, Maroc). Voici les en-t\u00eates et extraits des courriels \u00e9chang\u00e9s avec ${contactName(c)} (${c.mail}). R\u00e9dige en fran\u00e7ais un r\u00e9sum\u00e9 synth\u00e9tique et structur\u00e9 : sujets principaux, d\u00e9cisions prises, demandes en attente, et prochaines actions \u00e9ventuelles. Reste concis.\n\n${corpus}`;
    const text=await anthropicComplete(apiKey, prompt, 1024);
    out.innerHTML=aiBox(`R\u00e9sum\u00e9 des \u00e9changes \u00b7 ${msgs.length} message${msgs.length>1?'s':''}`, text||'(r\u00e9ponse vide)');
  }catch(e){
    out.innerHTML=`<div class="info-box warn">${esc(e.message||'Erreur inattendue')}</div>`;
  }finally{ if(btn)btn.disabled=false; }
}

async function scanAssocSite(id){
  const a=getAssoc(id); if(!a||!a.siteWeb)return;
  const out=$('scanResult'), btn=$('scanBtn');
  const url=/^https?:\/\//.test(a.siteWeb)?a.siteWeb:'https://'+a.siteWeb;
  if(btn)btn.disabled=true;
  out.innerHTML=`<div class="loading"><span class="spinner"></span>R\u00e9cup\u00e9ration de la page\u2026</div>`;
  try{
    const proxy='https://api.allorigins.win/raw?url='+encodeURIComponent(url);
    const r=await fetch(proxy);
    if(!r.ok) throw new Error('Page inaccessible ('+r.status+')');
    const html=await r.text();
    const doc=new DOMParser().parseFromString(html,'text/html');
    doc.querySelectorAll('script,style,noscript,svg').forEach(e=>e.remove());
    const text=((doc.body&&doc.body.innerText)||(doc.body&&doc.body.textContent)||'').replace(/[ \t]+/g,' ').replace(/\n{3,}/g,'\n\n').trim();
    const apiKey=((DB.settings&&DB.settings.anthropicKey)||'').trim();
    if(apiKey && text.length>200){
      out.innerHTML=`<div class="loading"><span class="spinner"></span>Analyse IA du contenu\u2026</div>`;
      const prompt=`Voici le texte de la page \u00ab ${url} \u00bb de l'association \u00ab ${a.nom} \u00bb. Liste en fran\u00e7ais, en puces courtes, les prochaines missions, sorties, \u00e9v\u00e9nements ou actions annonc\u00e9s (avec dates si pr\u00e9sentes). Si rien n'est clairement annonc\u00e9, dis-le simplement.\n\n${text.slice(0,6500)}`;
      try{
        const t=await anthropicComplete(apiKey, prompt, 800);
        out.innerHTML=aiBox(`Veille \u00b7 ${url.replace(/^https?:\/\//,'')}`, t||'(rien de notable)')
          +`<div class="muted" style="font-size:11.5px;margin-top:8px"><a href="${esc(url)}" target="_blank" rel="noopener">Ouvrir la page \u2192</a></div>`;
        if(btn)btn.disabled=false; return;
      }catch(e){/* repli heuristique ci-dessous */}
    }
    const KW=/(mission|sortie|chantier|fouille|conf\u00e9rence|colloque|atelier|r\u00e9union|assembl\u00e9e|exposition|agenda|actualit\u00e9|prochain|\u00e9v\u00e9nement|rendez|stage|prospection|f\u00eate|journ\u00e9e)/i;
    const lines=text.split(/\n+/).map(l=>l.trim()).filter(l=>l.length>12&&l.length<240);
    const hits=[...new Set(lines.filter(l=>KW.test(l)))].slice(0,12);
    if(hits.length){
      out.innerHTML=`<div class="ai-summary"><div class="ai-head"><svg viewBox="0 0 24 24" fill="none" width="15" height="15"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.7"/><path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>Extraits rep\u00e9r\u00e9s</div><div class="ai-body">${hits.map(h=>'\u2022 '+esc(h)).join('<br>')}</div></div><div class="muted" style="font-size:11.5px;margin-top:8px">Extraction heuristique \u2014 \u00e0 v\u00e9rifier. <a href="${esc(url)}" target="_blank" rel="noopener">Ouvrir la page \u2192</a></div>`;
    } else {
      out.innerHTML=`<div class="info-box">Aucune annonce clairement identifi\u00e9e sur la page. <a href="${esc(url)}" target="_blank" rel="noopener">Ouvrir la page \u2192</a></div>`;
    }
  }catch(e){
    out.innerHTML=`<div class="info-box warn">${esc(e.message||'\u00c9chec de la r\u00e9cup\u00e9ration')} \u2014 certaines pages bloquent l'acc\u00e8s externe (CORS). <a href="${esc(url)}" target="_blank" rel="noopener">Ouvrir la page \u2192</a></div>`;
  }finally{ if(btn)btn.disabled=false; }
}

/* ============================================================

function runSearch(q){
  q=(q||'').trim().toLowerCase();
  const box=$('searchResults');
  if(!q){ box.classList.remove('open'); box.innerHTML=''; return; }
  const m=(...fs)=>fs.filter(Boolean).join(' \u00b7 ').toLowerCase().includes(q);
  const groups=[];
  const ct=DB.contacts.filter(c=>m(c.nom,c.prenom,c.specialite,c.institution,c.laboratoire,c.mail,(c.tags||[]).join(' '))).slice(0,6);
  if(ct.length) groups.push(['Contacts', ct.map(c=>({ic:'\u25cd',t:contactName(c),s:c.specialite||c.institution||'',fn:`openContactDetail('${c.id}')`}))]);
  const st=DB.sites.filter(s=>m(s.nom,s.region,s.province,s.periode,(s.traditions||[]).join(' '),(s.tags||[]).join(' '))).slice(0,6);
  if(st.length) groups.push(['Sites', st.map(s=>({ic:'\u2316',t:s.nom,s:[s.region,s.province].filter(Boolean).join(' \u00b7 '),fn:`openSiteDetail('${s.id}')`}))]);
  const at=DB.associations.filter(a=>m(a.nom,a.specialite,a.presidentNom,a.adresse,(a.tags||[]).join(' '))).slice(0,6);
  if(at.length) groups.push(['Associations', at.map(a=>({ic:'\u2b21',t:a.nom,s:a.specialite||'',fn:`openAssocDetail('${a.id}')`}))]);
  const tk=DB.tasks.filter(t=>m(t.titre,t.description,t.categorie)).slice(0,6);
  if(tk.length) groups.push(['T\u00e2ches', tk.map(t=>({ic:'\u2713',t:t.titre,s:t.categorie||'',fn:`go('tasks');openTaskDetail('${t.id}')`}))]);
  const ev=DB.events.filter(e=>m(e.titre,e.lieu,e.notes)).slice(0,6);
  if(ev.length) groups.push(['Agenda', ev.map(e=>({ic:'\u25f7',t:e.titre,s:isoToShort(e.date),fn:`go('agenda');openEventDetail('${e.id}')`}))]);
  box.classList.add('open');
  if(!groups.length){ box.innerHTML=`<div class="sr-empty">Aucun r\u00e9sultat pour \u00ab ${esc(q)} \u00bb</div>`; return; }
  box.innerHTML=groups.map(([label,items])=>`<div class="sr-group-label">${label}</div>`+
    items.map(it=>`<div class="sr-item" onclick="closeSearch();${it.fn}"><div class="sr-ic">${it.ic}</div><div class="sr-tx"><b>${esc(it.t)}</b>${it.s?`<span>${esc(it.s)}</span>`:''}</div></div>`).join('')
  ).join('');
}
function closeSearch(){ const b=$('searchResults'); if(b)b.classList.remove('open'); const i=$('globalSearch'); if(i)i.value=''; }

/* ============================================================

   ============================================================ */
function exportJson(){
  DB.exportedAt=new Date().toISOString();
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`these-archeo-export-${todayISO()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  toast('Export t\u00e9l\u00e9charg\u00e9','ok');
}
function importJson(){ $('fileInput').click(); }
function handleImportFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    let data; try{ data=JSON.parse(reader.result); }catch(e){ toast('Fichier JSON invalide','err'); return; }
    if(!data||typeof data!=='object'){ toast('Fichier JSON invalide','err'); return; }
    if(!confirm('Remplacer toutes les donn\u00e9es actuelles par le fichier import\u00e9 ?')) return;
    DB=Object.assign(emptyDB(), data);
    if(!DB.traditions||!DB.traditions.length) DB.traditions=[...DEFAULT_TRADITIONS];
    if(!DB.settings) DB.settings={googleClientId:'',anthropicKey:''};
    save(); closeSearch(); render(state.view); toast('Import r\u00e9ussi','ok');
  };
  reader.readAsText(file);
}

/* ============================================================
   PWA — manifeste & icône générés à l'exécution
   ============================================================ */
function makeIcon(size){
  const cv=document.createElement('canvas'); cv.width=cv.height=size; const x=cv.getContext('2d');
  x.fillStyle='#1C1917'; x.fillRect(0,0,size,size);
  const cols=['#465F48','#5C7A5E','#B85C2C','#C99A5B','#E7DBC2'];
  const h=size/(cols.length+0.5);
  for(let i=0;i<cols.length;i++){ x.fillStyle=cols[i]; x.fillRect(0, size-(i+1)*h, size, h+1); }
  x.strokeStyle='#FBF6EC'; x.lineWidth=size*0.045; x.lineJoin='round'; x.lineCap='round';
  x.beginPath(); x.moveTo(size*0.12,size*0.60); x.lineTo(size*0.34,size*0.30); x.lineTo(size*0.5,size*0.48); x.lineTo(size*0.68,size*0.20); x.lineTo(size*0.88,size*0.58); x.stroke();
  return cv.toDataURL('image/png');
}
function setupPWA(){
  try{
    const i192=makeIcon(192), i512=makeIcon(512);
    const manifest={name:'Carnet de th\u00e8se \u2014 Art rupestre',short_name:'Carnet de th\u00e8se',start_url:'.',scope:'.',display:'standalone',orientation:'portrait',background_color:'#F2EAD8',theme_color:'#1C1917',icons:[{src:i192,sizes:'192x192',type:'image/png'},{src:i512,sizes:'512x512',type:'image/png'}]};
    const mlink=document.createElement('link'); mlink.rel='manifest';
    mlink.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'}));
    document.head.appendChild(mlink);
    const apple=document.createElement('link'); apple.rel='apple-touch-icon'; apple.href=i192; document.head.appendChild(apple);
    let fav=document.querySelector('link[rel="icon"]'); if(!fav){ fav=document.createElement('link'); fav.rel='icon'; document.head.appendChild(fav); } fav.href=i192;
  }catch(e){ /* PWA non bloquant */ }
}

  .spinner{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--sienna);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;flex:0 0 auto;}
  @keyframes spin{to{transform:rotate(360deg);}}

  `;
  const st=document.createElement('style'); st.textContent=css; document.head.appendChild(st);

/* ============================================================
   INITIALISATION
   ============================================================ */
function boot(){
  injectExtraCSS();
  setupPWA();
  load();
  if(!DB.contacts.length && !DB.sites.length && !DB.associations.length && !DB.tasks.length && !DB.events.length){
    seedExample(); save();
  }
  go('dashboard');
  const fi=$('fileInput');
  if(fi) fi.addEventListener('change', e=>{ handleImportFile(e.target.files[0]); e.target.value=''; });
  document.addEventListener('click', e=>{
    const wrap=document.querySelector('.search-wrap');
    if(wrap && !wrap.contains(e.target)){ const b=$('searchResults'); if(b)b.classList.remove('open'); }
  });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ const sc=$('scrim'); if(sc&&sc.classList.contains('open')) closeModal(); const b=$('searchResults'); if(b)b.classList.remove('open'); } });
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot); else boot();
</script>
